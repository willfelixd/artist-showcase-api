# application.properties (configurações comuns a todos os ambientes)
spring.application.name=artist-showcase-api
server.port=8080

spring.profiles.active=dev

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# E-mail (valores reais vão no application-dev.properties)
app.mail.to=${MAIL_TO}
app.mail.from=${MAIL_FROM}

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

springdoc.packagesToScan=com.artistshowcase.api
springdoc.pathsToMatch=/api/**

# Cache
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false