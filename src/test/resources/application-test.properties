# Banco H2 em memµria para os testes ? isolado do banco de desenvolvimento
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# JWT para testes
app.jwt.secret=chave-de-teste-super-longa-para-nao-dar-erro-de-tamanho-insuficiente
app.jwt.expiration-ms=3600000

# E-mail desabilitado nos testes
spring.mail.host=localhost
spring.mail.port=3025
app.mail.to=test@test.com
app.mail.from=test@test.com

# Admin padrÐo nos testes
app.admin.username=admin
app.admin.password=admin123

# Redis desabilitado nos testes
spring.cache.type=none
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration