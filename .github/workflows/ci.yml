name: CI — Build e Testes

# Quando esse workflow roda
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest

    services:
      # Sobe um PostgreSQL para os testes de integração
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Configura o Java 17
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache das dependências do Gradle
      # Se o build.gradle não mudou, reutiliza o cache → build muito mais rápido
      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Permissão de execução no Gradle wrapper
      - name: Permissão no gradlew
        run: chmod +x gradlew

      # 5. Compila o projeto
      - name: Compilar
        run: ./gradlew compileJava --no-daemon

      # 6. Roda os testes
      - name: Rodar testes
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          APP_JWT_SECRET: chave-de-teste-longa-para-ci-nao-dar-erro-aqui
          APP_MAIL_TO: test@test.com
          APP_MAIL_FROM: test@test.com
          APP_ADMIN_USERNAME: admin
          APP_ADMIN_PASSWORD: admin123

      # 7. Publica o relatório de testes (visível na aba Actions do GitHub)
      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always() # Publica mesmo se os testes falharem
        with:
          name: test-report
          path: build/reports/tests/test/

      # 8. Gera o .jar final
      - name: Gerar JAR
        run: ./gradlew bootJar --no-daemon -x test

      # 9. Guarda o .jar como artefato do workflow
      - name: Salvar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 5