name: CD — Deploy no Render

on:
  # Roda apenas quando o CI passa na branch main
  workflow_run:
    workflows: [ "CI — Build e Testes" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  deploy:
    name: Deploy no Render
    runs-on: ubuntu-latest

    # Só faz deploy se o CI passou (não se falhou)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy no Render via API
        run: |
          echo "Iniciando deploy no Render..."
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys")
          
          if [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Deploy iniciado com sucesso (HTTP $RESPONSE)"
          else
            echo "❌ Falha ao iniciar deploy (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Aguardar deploy completar
        run: |
          echo "Aguardando deploy finalizar..."
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              | python3 -c "import sys, json; data=json.load(sys.stdin); print(data[0]['deploy']['status'])")

            echo "Status atual: $STATUS (tentativa $((ATTEMPT+1))/$MAX_ATTEMPTS)"

            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy concluído com sucesso!"
              exit 0
            elif [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "build_failed" ]; then
              echo "❌ Deploy falhou com status: $STATUS"
              exit 1
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 20
          done

          echo "⚠️ Timeout aguardando deploy"
          exit 1

      - name: Verificar saúde da aplicação
        run: |
          echo "Verificando endpoint de saúde..."
          sleep 10
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://seu-app.onrender.com/api/health")
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Aplicação está respondendo (HTTP $RESPONSE)"
          else
            echo "❌ Aplicação não responde (HTTP $RESPONSE)"
            exit 1
          fi